<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H&M | Fashion for Women, Men & Kids</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="announcement-bar">
        Free shipping for members on orders over Rs.1999!
    </div>

    <header>
        <div class="top-bar">
            <div class="search-box">
                <input type="text" placeholder="Search products">
            </div>
            <div class="logo">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/H%26M-Logo.svg" alt="H&M Logo">
            </div>
            <nav class="user-nav">
                <a href="#">Sign in</a>
                <a href="#">Favorites</a>
                <a href="#" id="cart-btn">Shopping bag (0)</a>
            </nav>
        </div>
        <nav class="main-nav">
            <ul>
                <li><a href="#" class="active">LADIES</a></li>
                <li><a href="#">MEN</a></li>
                <li><a href="#">DIVIDED</a></li>
                <li><a href="#">KIDS</a></li>
                <li><a href="#">H&M HOME</a></li>
                <li><a href="#">SALE</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero" id="hero-section">
            <div class="hero-content">
                <h2>SOFT PASTELS</h2>
                <p>New season, new shades. Explore our latest arrivals.</p>
                <button class="shop-btn" onclick="addToCart()">SHOP NOW</button>
            </div>
        </section>

        <section class="product-grid">
            <div class="product-card">
                <div class="img-container">
                    <img src="https://images.unsplash.com/photo-1539109136881-3be0616acf4b?auto=format&fit=crop&w=500&q=80" alt="Product">
                </div>
                <div class="product-info">
                    <h4>Linen-blend Dress</h4>
                    <p>Rs. 2,299.00</p>
                </div>
            </div>
            <div class="product-card">
                <div class="img-container">
                    <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=500&q=80" alt="Product">
                </div>
                <div class="product-info">
                    <h4>Cotton Shirt</h4>
                    <p>Rs. 1,499.00</p>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
