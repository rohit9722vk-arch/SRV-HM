<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIUL | Wholesale Fashion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="promo-bar">
        FREE SHIPPING ON ORDERS ABOVE Rs. 495/- • COD AVAILABLE
    </div>

    <header>
        <div class="header-main">
            <div class="menu-icon">☰</div>
            <div class="brand-logo">VIUL</div>
            <div class="header-icons">
                <span>🔍</span>
                <span>🛍️<small id="cart-count">0</small></span>
            </div>
        </div>
    </header>

    <section class="category-scroll">
        <div class="cat-circle">
            <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=100&h=100&fit=crop" alt="Men">
            <p>Men</p>
        </div>
        <div class="cat-circle">
            <img src="https://images.unsplash.com/photo-1539109136881-3be0616acf4b?w=100&h=100&fit=crop" alt="Women">
            <p>Women</p>
        </div>
        <div class="cat-circle">
            <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=100&h=100&fit=crop" alt="Accs">
            <p>Accessories</p>
        </div>
        <div class="cat-circle">
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=100&h=100&fit=crop" alt="Home">
            <p>Lifestyle</p>
        </div>
    </section>

    <main class="product-container">
        <div class="filter-row">
            <button class="filter-btn">FILTER</button>
            <select>
                <option>Best Selling</option>
            </select>
        </div>

        <div class="grid">
            <div class="product-card">
                <span class="badge">-50%</span>
                <div class="product-img">
                    <img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=400&fit=crop" alt="Product">
                </div>
                <div class="product-details">
                    <h3>Essential VIUL Tee</h3>
                    <p class="price"><span class="old">Rs. 999</span> Rs. 499</p>
                    <button class="add-to-cart" onclick="updateCart()">ADD TO CART</button>
                </div>
            </div>
            </div>
    </main>

    <nav class="mobile-nav">
        <div class="nav-item">🏠<br>Shop</div>
        <div class="nav-item">❤️<br>Wishlist</div>
        <div class="nav-item">🛒<br>Cart</div>
        <div class="nav-item">👤<br>Account</div>
    </nav>

    <script src="script.js"></script>
</body>
</html>
