<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H&M Replica | Fashion & Quality</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="top-bar">
            <div class="logo">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/H%26M-Logo.svg" alt="H&M Logo">
            </div>
            <nav class="user-nav">
                <a href="#">Sign in</a>
                <a href="#">Favourites</a>
                <a href="#">Shopping bag (0)</a>
            </nav>
        </div>
        <nav class="main-nav">
            <ul>
                <li><a href="#">LADIES</a></li>
                <li><a href="#">MEN</a></li>
                <li><a href="#">KIDS</a></li>
                <li><a href="#">HOME</a></li>
                <li><a href="#">BEAUTY</a></li>
                <li><a href="#">SUSTAINABILITY</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h3>MAY IN SOFT TONES</h3>
                <a href="#" class="shop-btn">SHOP NOW</a>
                <p class="price">Rs. 2,999.00</p>
            </div>
        </section>

        <section class="categories">
            <div class="cat-item">
                <div class="placeholder-img"></div>
                <h4>AIRY VOLUMES</h4>
                <a href="#">SHOP NOW</a>
            </div>
            <div class="cat-item">
                <div class="placeholder-img"></div>
                <h4>CRAFTED FOR SUMMER</h4>
                <a href="#">SHOP NOW</a>
            </div>
        </section>
    </main>

</body>
</html>
